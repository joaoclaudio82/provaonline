services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prova
      POSTGRES_PASSWORD: prova
      POSTGRES_DB: prova
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prova"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://prova:prova@db:5432/prova
      PROFESSOR_PASSWORD: ${PROFESSOR_PASSWORD:-123456}
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/styles:/usr/share/nginx/html/styles:ro
      - ./frontend/src:/usr/share/nginx/html/src:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
